# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

scrolling {
    column_width = 0.5
    focus_fit_method = 1
    follow_focus = true
    follow_min_visible = 0.4
    wrap_focus = true
    wrap_swapcol = true
    direction = right
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

# Hyprland defaults to hyprcursor; without a hyprcursor pack it can ignore XCURSOR_THEME for the compositor cursor.
cursor {
    enable_hyprcursor = false
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default = true

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$mod1 = ALT

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, BACKSPACE, exec, alacritty
bind = $mainMod, Escape, killactive,
bind = $mainMod, RETURN, exec, rofi -show drun
# Log out / shutdown UI: run hyprshutdown through Hyprland so env/session is correct (avoids hangs/slowdowns from bare hyprshutdown — see hyprshutdown#15). If not installed, plain exit.
bind = $mainMod, M, exec, sh -c 'command -v hyprshutdown >/dev/null 2>&1 && hyprctl dispatch exec hyprshutdown || hyprctl dispatch exit'
bind = $mainMod, L, exec, hyprlock
# Compositor fullscreen without telling the app (no in-app “F11 fullscreen” / presentation UI)
# See Hyprland wiki: fullscreenstate — e.g. internal=2 (fullscreen), client=0 (non-fullscreen to client)
bind = $mainMod, F, fullscreenstate, 2 0 toggle
# Float + pin (sticky on all workspaces); runs in order
bind = $mainMod SHIFT, F, setfloating,
bind = $mainMod SHIFT, F, pin,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
# Scrolling layout helpers
bind = $mainMod, comma, layoutmsg, swapcol l
bind = $mainMod, period, layoutmsg, move +col

# Alt-Tab (Windows-like with previews)
# Requires: alttabway (installed via cargo)
binde = $mod1, TAB, exec, alttabway show --next
binde = $mod1 SHIFT, TAB, exec, alttabway show --previous

# If you have blur enabled in Hyprland (you do), this makes the switcher match nicely
layerrule = blur on, ignore_alpha 0, match:namespace ^alttabway$

# Last workspace (Super+Tab — Alt+Tab is window switcher above)
bind = $mainMod, TAB, workspace, previous

# Reload Hyprland config
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces (Qtile-style)
bind = $mainMod, Q, workspace, 1
bind = $mainMod, W, workspace, 2
bind = $mainMod, E, workspace, 3
bind = $mainMod, R, workspace, 4
bind = $mainMod, T, workspace, 5

bind = $mainMod, 1, workspace, 6
bind = $mainMod, 2, workspace, 7
bind = $mainMod, 3, workspace, 8
bind = $mainMod, 4, workspace, 9
bind = $mainMod, 5, workspace, 10

# Move active window (optional)
bind = $mainMod SHIFT, 1, movetoworkspace, 6
bind = $mainMod SHIFT, 2, movetoworkspace, 7
bind = $mainMod SHIFT, 3, movetoworkspace, 8
bind = $mainMod SHIFT, 4, movetoworkspace, 9
bind = $mainMod SHIFT, 5, movetoworkspace, 10

# Move active window to a workspace (Qtile-style)
# mod+CTRL+q/w/e/r/t  -> workspaces 1-5
bind = $mainMod CTRL, Q, movetoworkspace, 1
bind = $mainMod CTRL, W, movetoworkspace, 2
bind = $mainMod CTRL, E, movetoworkspace, 3
bind = $mainMod CTRL, R, movetoworkspace, 4
bind = $mainMod CTRL, T, movetoworkspace, 5
# mod+CTRL+1-5 -> workspaces 6-10
bind = $mainMod CTRL, 1, movetoworkspace, 6
bind = $mainMod CTRL, 2, movetoworkspace, 7
bind = $mainMod CTRL, 3, movetoworkspace, 8
bind = $mainMod CTRL, 4, movetoworkspace, 9
bind = $mainMod CTRL, 5, movetoworkspace, 10

# Scratchpads
bind = $mod1, A, togglespecialworkspace, term
bind = $mod1, W, togglespecialworkspace, whatsapp

# Scroll through windows/columns in scrolling layout with mainMod + scroll
bind = $mainMod, mouse_down, layoutmsg, focus l
bind = $mainMod, mouse_up, layoutmsg, focus r

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots: needs grim; clipboard needs wl-clipboard (sudo apt install wl-clipboard). Region select needs slurp (sudo apt install slurp).
# If nothing happens, allow screencopy for grim under ecosystem/permission in this file.
# Print = drag a region → clipboard (or ~/Pictures/Screenshots if wl-copy missing). Shift+Print = full screen → clipboard (or file fallback).
# Region: use `slurp | grim -g - -` (not grim -g "$(slurp)") — see https://github.com/emersion/grim/issues/51
bind = , PRINT, exec, sh -c 'if command -v slurp >/dev/null && command -v wl-copy >/dev/null; then slurp | grim -g - - | wl-copy --type image/png; elif command -v slurp >/dev/null; then mkdir -p "$HOME/Pictures/Screenshots" && slurp | grim -g - - "$HOME/Pictures/Screenshots/area-$(date +%Y%m%d-%H%M%S).png"; fi'
bind = SHIFT, PRINT, exec, sh -c 'if command -v wl-copy >/dev/null; then grim - | wl-copy --type image/png; else mkdir -p "$HOME/Pictures/Screenshots" && grim "$HOME/Pictures/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png"; fi'

# Region screen record: Meta+Del — slurp → wf-recorder to ~/Videos; Meta+Del again stops. Needs: sudo apt install wf-recorder slurp
bind = $mainMod, DELETE, exec, $HOME/.config/hypr/scripts/record-region-toggle.sh

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +1%
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -1%
bindel = ,XF86AudioMute, exec, playerctl play-pause
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Scratchpad auto-launch when special workspace is created empty
workspace = special:term, on-created-empty:alacritty --class scratch-term --title scratch-term -e tmux
workspace = special:whatsapp, on-created-empty:flatpak run com.rtosta.zapzap

# Scratchpads (default sizing; just float + assign)
windowrule {
    name = scratchpad-term
    match:class = ^scratch-term$
    float = yes
    workspace = special:term
}

windowrule {
    name = scratchpad-whatsapp
    match:class = ^zapzap$
    float = yes
    workspace = special:whatsapp
}
