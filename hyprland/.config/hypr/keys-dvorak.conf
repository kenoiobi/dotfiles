# Position-based keys — same physical locations as keys-qwerty.conf, US Dvorak labels.
# Switch profile in hyprland.conf: source = ~/.config/hypr/keys-dvorak.conf

$k_ws1 = apostrophe
$k_ws2 = comma
$k_ws3 = period
$k_ws4 = P
$k_ws5 = Y

# Physical keys where QWERTY has , and . (Dvorak: w and v)
$k_comma = W
$k_period = V

# Alt+… scratchpads — same physical keys as QWERTY A, comma, O (Dvorak: a, w, r)
$k_scratch_term = A
$k_scratch_whatsapp = comma
$k_scratch_slack = O

# Super+F — physical key where QWERTY has F (Dvorak: u)
$k_meta_f = U
