# Position-based keys (workspaces row, comma/period, scratchpads, Super+F). Other binds use literals in keybinds.conf.
# Switch profile in hyprland.conf: source = ~/.config/hypr/keys-qwerty.conf

$k_ws1 = Q
$k_ws2 = W
$k_ws3 = E
$k_ws4 = R
$k_ws5 = T

# , and . (scrolling layoutmsg)
$k_comma = comma
$k_period = period

# Alt+… scratchpads (same physical keys as QWERTY A, comma, O)
$k_scratch_term = A
$k_scratch_whatsapp = comma
$k_scratch_slack = O

# Super+F (fullscreen); Super+Shift+F (float + pin) — same physical key as QWERTY F
$k_meta_f = F
